<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Tip Calculator</h1>

    <label>Bill Amount (Rs)</label>
    <input type="number" id="bill" placeholder="Enter bill amount">

    <p class="error" id="billError"></p>

    <label>Select Tip %</label>

    <div class="tip-buttons">
      <button class="tip-btn">10%</button>
      <button class="tip-btn">15%</button>
      <button class="tip-btn">20%</button>
    </div>

    <input type="number" id="customTip" placeholder="Custom tip %">

    <p class="error" id="tipError"></p>

    <label>Number of People</label>
    <input type="number" id="people" placeholder="Enter number of people">

    <p class="error" id="peopleError"></p>

    <div class="results">
      <h3>Total Tip: <span id="totalTip">0</span></h3>
      <h3>Grand Total: <span id="grandTotal">0</span></h3>
      <h3>Per Person: <span id="perPerson">0</span></h3>
    </div>

    <button id="reset">Reset</button>

  </div>

  <script src="script.js"></script>

</body>
</html>
